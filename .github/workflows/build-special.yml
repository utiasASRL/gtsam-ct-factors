name: Special Cases CI

on:
  pull_request:
    paths-ignore:
      - '**.md'
      - '**.ipynb' 
      - 'myst.yml'

# Cancels any in-progress workflow runs for the same PR when a new push is made,
# allowing the runner to become available more quickly for the latest changes.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }} ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        # Github Actions requires a single row to be added to the build matrix.
        # See https://help.github.com/en/articles/workflow-syntax-for-github-actions.
        name:
          [
            ubuntu-clang-deprecated,
            ubuntu-clang-quaternions,
            ubuntu-clang-tbb,
            ubuntu-clang-cayleymap,
            ubuntu-clang-system-libs,
            ubuntu-no-unstable,
            ubuntu-build-examples,
          ]

        build_type: [Release]

        include:
          - name: ubuntu-clang-deprecated
            os: ubuntu-22.04
            compiler: clang
            version: "14"
            flag: deprecated

          - name: ubuntu-clang-quaternions
            os: ubuntu-22.04
            compiler: clang
            version: "14"
            flag: quaternions

          - name: ubuntu-clang-tbb
            os: ubuntu-22.04
            compiler: clang
            version: "14"
            flag: tbb

          - name: ubuntu-clang-cayleymap
            os: ubuntu-22.04
            compiler: clang
            version: "14"
            flag: cayley

          - name: ubuntu-clang-system-libs
            os: ubuntu-22.04
            compiler: clang
            version: "14"
            flag: system

          - name: ubuntu-no-unstable
            os: ubuntu-22.04
            compiler: clang
            version: "14"
            flag: no_unstable

          - name: ubuntu-build-examples
            os: ubuntu-22.04
            compiler: clang
            version: "14"
            flag: build_examples

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull Docker Image
        run: docker pull borglab/gtsam-ci:${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.version }}

      - name: Set Allow Deprecated Flag
        if: matrix.flag == 'deprecated'
        run: |
          echo "GTSAM_ALLOW_DEPRECATED_SINCE_V43=ON" >> $GITHUB_ENV
          echo "Allow deprecated since version 4.3"

      - name: Set Use Quaternions Flag
        if: matrix.flag == 'quaternions'
        run: |
          echo "GTSAM_USE_QUATERNIONS=ON" >> $GITHUB_ENV
          echo "Use Quaternions for rotations"

      - name: Set GTSAM_WITH_TBB Flag
        if: matrix.flag == 'tbb'
        run: |
          echo "GTSAM_WITH_TBB=ON" >> $GITHUB_ENV
          echo "GTSAM Uses TBB"

      - name: Use Cayley Transform for Rot3
        if: matrix.flag == 'cayley'
        run: |
          echo "GTSAM_POSE3_EXPMAP=OFF" >> $GITHUB_ENV
          echo "GTSAM_ROT3_EXPMAP=OFF" >> $GITHUB_ENV
          echo "GTSAM Uses Cayley map for Rot3"

      - name: Build Examples
        if: matrix.flag == 'build_examples'
        run: |
          echo "GTSAM_BUILD_EXAMPLES_ALWAYS=ON" >> $GITHUB_ENV

      - name: Use system versions of 3rd party libraries
        if: matrix.flag == 'system'
        run: |
          echo "GTSAM_USE_SYSTEM_EIGEN=ON" >> $GITHUB_ENV
          echo "GTSAM_USE_SYSTEM_METIS=ON" >> $GITHUB_ENV

      - name: Turn off unstable
        if: matrix.flag == 'no_unstable'
        run: |
          echo "GTSAM_BUILD_UNSTABLE=OFF" >> $GITHUB_ENV
          echo "GTSAM 'unstable' will not be built."

      - name: Create swap (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          # Attempts to create and enable a swap file at /mnt/swapfile.
          # It tries different sizes (8G, 4G, 2G, 1G) until successful.
          set -euo pipefail
          SWAP=/mnt/swapfile
          sudo swapoff $SWAP 2>/dev/null || true
          sudo rm -f $SWAP
          
          for SIZE in 8 4 2 1; do
            if sudo fallocate -l ${SIZE}G $SWAP; then
              sudo chmod 600 $SWAP
              sudo mkswap $SWAP
              sudo swapon $SWAP && break
              fi
              sudo rm -f $SWAP
              done
              
          # Displays active swap spaces at the end.
          swapon --show

      - name: Build & Test
        run: |
          docker run -v $GITHUB_WORKSPACE:/gtsam \
            -e CMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -e GTSAM_BUILD_UNSTABLE=${{ env.GTSAM_BUILD_UNSTABLE || 'ON' }} \
            -e GTSAM_ALLOW_DEPRECATED_SINCE_V43=${{ env.GTSAM_ALLOW_DEPRECATED_SINCE_V43 || 'OFF' }} \
            -e GTSAM_USE_QUATERNIONS=${{ env.GTSAM_USE_QUATERNIONS || 'OFF' }} \
            -e GTSAM_WITH_TBB=${{ env.GTSAM_WITH_TBB || 'OFF' }} \
            -e GTSAM_POSE3_EXPMAP=${{ env.GTSAM_POSE3_EXPMAP || 'ON' }} \
            -e GTSAM_ROT3_EXPMAP=${{ env.GTSAM_ROT3_EXPMAP || 'ON' }} \
            -e GTSAM_BUILD_EXAMPLES_ALWAYS=${{ env.GTSAM_BUILD_EXAMPLES_ALWAYS || 'OFF' }} \
            -e GTSAM_USE_SYSTEM_EIGEN=${{ env.GTSAM_USE_SYSTEM_EIGEN || 'OFF' }} \
            -e GTSAM_USE_SYSTEM_METIS=${{ env.GTSAM_USE_SYSTEM_METIS || 'OFF' }} \
            borglab/gtsam-ci:${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.version }}