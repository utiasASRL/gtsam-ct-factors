files:
  input : "examples/Data/LostInTheWoods.txt"
  output : "results/lost.csv" 
  gt_out : "results/lost_gt.csv"
params:
  r_max: 1.0
  del_t: 0.1
  start: 1000
  end: 2000
flags:
  prior: true
  odom: true
  wnoa: true
  br: false
  gt_init: true
noise:
  prior: [1e-2, 1e-2, 1e-3]
  odom_y: 1e-1
  wnoa: [1e-2, 1e-3, 5e-4]
  bearing: 1e-1
  range: 1e-1