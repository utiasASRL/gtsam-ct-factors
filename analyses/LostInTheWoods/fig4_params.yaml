files:
  input : "LostInTheWoods/LostInTheWoods.txt"
  output : "results/litw_fig4_full.csv" 
  gt_out : "results/litw_fig4_gt.csv"
  interp_raw_file: "results/litw_fig4_est.csv"
  interp_out : "results/litw_fig4_interp.csv" 
  interp_graph_out : "results/litw_fig4_graph_interp.csv"
params:
  r_max: 10
  del_t: 0.1
  start: 2000
  end: 5000
  n_runs: 1
flags:
  prior: true
  odom: false
  wnoa: true
  br: true
  gt_init: false
  solve_slam: true
interp:
  enable: true
  interp_period: 30 
  fixed_noise: false
noise:
  prior: [1e-2, 1e-2, 1e-3]
  odom_y: 1.0e-2
  wnoa: [5e-2, 5e-3, 10e-4]
  bearing: 1.0
  range: 1.0