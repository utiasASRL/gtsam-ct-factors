files:
  input : "LostInTheWoods/LostInTheWoods.txt"
  output : "results/lost.csv" 
  gt_out : "results/lost_gt.csv"
  interp_raw_file: "results/lost_interp_raw.csv"
  interp_out : "results/lost_interp.csv" 
  interp_graph_out : "results/default_graph.csv"
params:
  r_max: 10.0
  del_t: 0.1
  start: 1000
  end: 6000
  n_runs: 1000
flags:
  prior: true
  odom: true
  wnoa: False
  br: true
  gt_init: false
  solve_slam: false
interp:
  enable: false
  interp_period: 10 
  fixed_noise: false
noise:
  prior: [1e-2, 1e-2, 1e-3]
  odom_y: 1.0e-2
  wnoa: [1e-2, 1e-3, 5e-4]
  bearing: 1.5
  range: 1.5